version: "3.9"

services:

  node1:
    build: .
    container_name: node1
    environment:
      NODE_ID: "1"
      MODE: "PAXOS"
    ports:
      - "5001:5000"

  node2:
    build: .
    container_name: node2
    environment:
      NODE_ID: "2"
      MODE: "PAXOS"
    ports:
      - "5002:5000"

  node3:
    build: .
    container_name: node3
    environment:
      NODE_ID: "3"
      MODE: "PAXOS"
    ports:
      - "5003:5000"

  node4:
    build: .
    container_name: node4
    environment:
      NODE_ID: "4"
      MODE: "PBFT"
    ports:
      - "5004:5000"

  node5:
    build: .
    container_name: node5
    environment:
      NODE_ID: "5"
      MODE: "PBFT"
    ports:
      - "5005:5000"

  client:
    build: .
    command: python src/client.py
    depends_on:
      - node1

  adversary:
    build: .
    command: python src/adversary.py